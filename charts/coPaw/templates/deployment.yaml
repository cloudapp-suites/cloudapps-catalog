apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "copaw.fullname" . }}
  labels:
    {{- include "copaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "copaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "copaw.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          {{- if .Values.env }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: working-data
              mountPath: /app/working
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: working-data
          persistentVolumeClaim:
            claimName: {{ include "copaw.fullname" . }}-working
      {{- end }}
