image:
  repository: ghcr.io/zeroclaw-labs/zeroclaw
  tag: main
  pullPolicy: Always

# User-facing fields (filled by frontend)
externalEnv:
  # 百炼 API Key，用于调用通义千问等大模型
  # 获取方式：登录百炼控制台 https://bailian.console.aliyun.com/ -> API Key 管理
  # 格式：sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  DASHSCOPE_API_KEY: ""

# LLM provider
# Use custom: prefix for DashScope (OpenAI-compatible)
provider: "custom:https://dashscope.aliyuncs.com/compatible-mode/v1"

# Default model
model: "qwen-max"

# Network
service:
  type: LoadBalancer
  port: 3000

containerPort: 3000

# Resources (ZeroClaw is extremely lightweight)
resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "2000m"

# Persistence
persistence:
  enabled: true
  storageClass: alicloud-disk-essd
  size: 20Gi

# EDAS integration
edas:
  enabled: false
