apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zeroclaw.fullname" . }}
  labels:
    {{- include "zeroclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "zeroclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zeroclaw.labels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 65534
      initContainers:
        - name: init-config
          image: "apaas-registry.cn-hangzhou.cr.aliyuncs.com/cloud-app/busybox:latest"
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /zeroclaw-data/.zeroclaw /zeroclaw-data/workspace
              cat > /zeroclaw-data/.zeroclaw/config.toml << 'TOML'
              workspace_dir = "/zeroclaw-data/workspace"
              config_path = "/zeroclaw-data/.zeroclaw/config.toml"
              api_key = ""
              default_provider = "openrouter"
              default_model = "anthropic/claude-sonnet-4-20250514"
              default_temperature = 0.7

              [gateway]
              port = 3000
              host = "[::]"
              allow_public_bind = true
              require_pairing = false
              TOML
              chown -R 65534:65534 /zeroclaw-data
              echo "Config initialized"
          volumeMounts:
            - name: data
              mountPath: /zeroclaw-data
      containers:
        - name: zeroclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "zeroclaw.fullname" . }}-env
          ports:
            - name: gateway
              containerPort: {{ .Values.containerPort }}
          volumeMounts:
            - name: data
              mountPath: /zeroclaw-data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "zeroclaw.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
