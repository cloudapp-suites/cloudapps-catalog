apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zeroclaw.fullname" . }}-env
  labels:
    {{- include "zeroclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_KEY: {{ .Values.externalEnv.DASHSCOPE_API_KEY | quote }}
  DASHSCOPE_API_KEY: {{ .Values.externalEnv.DASHSCOPE_API_KEY | quote }}
  PROVIDER: {{ .Values.provider | quote }}
  ZEROCLAW_MODEL: {{ .Values.model | default "qwen-max" | quote }}
  ZEROCLAW_ALLOW_PUBLIC_BIND: "true"
  ZEROCLAW_GATEWAY_PORT: {{ .Values.containerPort | quote }}
  HOME: "/zeroclaw-data"
  ZEROCLAW_WORKSPACE: "/zeroclaw-data/workspace"
