image:
  repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/hiclaw-manager
  tag: latest
  pullPolicy: IfNotPresent

# User-facing fields (filled by frontend)
externalEnv:
  # 百炼 API Key，用于调用通义千问等大模型
  # 获取方式：登录百炼控制台 https://bailian.console.aliyun.com/ -> API Key 管理
  # 格式：sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  DASHSCOPE_API_KEY: ""
  # HiClaw 管理员密码，留空则自动生成
  HICLAW_ADMIN_PASSWORD: ""

# LLM Configuration
llm:
  provider: "alibaba-cloud"
  baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  defaultModel: "qwen3.5-plus"

# Admin credentials
admin:
  username: "admin"

# MinIO credentials (user >= 3 chars, password >= 8 chars required by MinIO)
# Leave password empty to auto-generate a secure one
minio:
  user: "admin"
  password: ""

# Network
service:
  type: LoadBalancer
  # Element Web (chat UI) on port 80 — default when accessing LB IP directly
  elementWebPort: 80
  gatewayPort: 18088
  consolePort: 18001

# Container ports (internal)
containerPorts:
  gateway: 8080
  console: 8001
  elementWeb: 8088
  openclawConsole: 18888

# Domain configuration
# matrix domain keeps :18088 (Tuwunel server_name, cannot change after DB init)
# Other domains MUST NOT contain port numbers (colon breaks K8s labels in Higress)
domains:
  matrix: "matrix-local.hiclaw.io:18088"
  elementWeb: "element-local.hiclaw.io"
  aiGateway: "aigw-local.hiclaw.io"
  fileSystem: "fs-local.hiclaw.io"
  openclawConsole: "console-local.hiclaw.io"

# Element Web homeserver override (for K8s: use LoadBalancer IP:Port since browser can't resolve internal domains)
# Format: "IP:PORT" e.g. "8.136.15.102:18088". Set to "" to use default HICLAW_MATRIX_DOMAIN.
elementHomeserverUrl: ""

# Worker images (override default images with enhanced versions that include common Linux tools)
workerImage: "apaas-registry.cn-hangzhou.cr.aliyuncs.com/cloud-app/hiclaw-copaw-worker:latest"
copawWorkerImage: "apaas-registry.cn-hangzhou.cr.aliyuncs.com/cloud-app/hiclaw-copaw-worker:latest"

# Worker runtime
defaultWorkerRuntime: "copaw"

# Matrix E2EE
matrixE2ee: "0"

# Persistence
persistence:
  enabled: true
  storageClass: alicloud-disk-essd
  dataSize: 20Gi

# Resources
resources:
  requests:
    memory: "2Gi"
    cpu: "500m"
  limits:
    memory: "8Gi"
    cpu: "4000m"

# EDAS integration
edas:
  enabled: false
