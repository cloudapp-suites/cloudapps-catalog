{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-env" (include "hiclaw.fullname" .))) -}}
{{- $managerPassword := "" -}}
{{- $registrationToken := "" -}}
{{- if $existingSecret }}
  {{- $managerPassword = index $existingSecret.data "HICLAW_MANAGER_PASSWORD" | b64dec -}}
  {{- $registrationToken = index $existingSecret.data "HICLAW_REGISTRATION_TOKEN" | b64dec -}}
{{- end }}
{{- if not $managerPassword }}
  {{- $managerPassword = randAlphaNum 16 -}}
{{- end }}
{{- if not $registrationToken }}
  {{- $registrationToken = randAlphaNum 32 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hiclaw.fullname" . }}-env
  labels:
    {{- include "hiclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  HICLAW_LLM_PROVIDER: {{ .Values.llm.provider | quote }}
  HICLAW_LLM_API_KEY: {{ .Values.externalEnv.HICLAW_LLM_API_KEY | quote }}
  HICLAW_LLM_BASE_URL: {{ .Values.llm.baseUrl | quote }}
  HICLAW_DEFAULT_MODEL: {{ .Values.llm.defaultModel | quote }}
  HICLAW_ADMIN_USER: {{ .Values.admin.username | quote }}
  HICLAW_ADMIN_PASSWORD: {{ .Values.externalEnv.HICLAW_ADMIN_PASSWORD | quote }}
  HICLAW_MATRIX_DOMAIN: {{ .Values.domains.matrix | quote }}
  HICLAW_MATRIX_CLIENT_DOMAIN: {{ .Values.domains.elementWeb | quote }}
  HICLAW_AI_GATEWAY_DOMAIN: {{ .Values.domains.aiGateway | quote }}
  HICLAW_FS_DOMAIN: {{ .Values.domains.fileSystem | quote }}
  HICLAW_CONSOLE_DOMAIN: {{ .Values.domains.openclawConsole | quote }}
  HICLAW_MINIO_USER: {{ .Values.admin.username | quote }}
  HICLAW_MINIO_PASSWORD: {{ .Values.externalEnv.HICLAW_ADMIN_PASSWORD | quote }}
  HICLAW_MANAGER_PASSWORD: {{ $managerPassword | quote }}
  HICLAW_REGISTRATION_TOKEN: {{ $registrationToken | quote }}
  HICLAW_DEFAULT_WORKER_RUNTIME: {{ .Values.defaultWorkerRuntime | quote }}
  HICLAW_MATRIX_E2EE: {{ .Values.matrixE2ee | quote }}
  HICLAW_DATA_DIR: "/data"
  HICLAW_WORKSPACE_DIR: "/root/manager-workspace"
  HIGRESS_ADMIN_WASM_PLUGIN_IMAGE_REGISTRY: "higress-registry.cn-hangzhou.cr.aliyuncs.com"
