hub: apaas-registry.cn-hangzhou.cr.aliyuncs.com/cloud-app/higress-group
frontend:
  image:
    repository: himarket-frontend
    tag: "1.0.0"

admin:
  image:
    repository: himarket-admin
    tag: "1.0.0"

server:
  image:
    repository: himarket-server
    tag: "1.0.0"

mysql:
  enabled: true
  image:
    repository: mysql
    tag: "1.0.0"
  persistence:
    size: 50Gi
    storageClass: "alicloud-disk-essd"
  resources: {}

# 外部数据库配置（当 mysql.enabled=false 时使用）
database:
  host: "Your_External_DB_Host"  # 外部数据库地址
  port: "3306"
  name: "Your_DB_Name"
  username: "Your_DB_Username"
  password: "Your_DB_Password"

resources: {}