{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-env" (include "longclaw.fullname" .))) -}}
{{- $secretKey := "" -}}
{{- $superuserPassword := "" -}}
{{- if $existingSecret }}
  {{- $secretKey = index $existingSecret.data "DJANGO_SECRET_KEY" | b64dec -}}
  {{- if hasKey $existingSecret.data "DJANGO_SUPERUSER_PASSWORD" }}
    {{- $superuserPassword = index $existingSecret.data "DJANGO_SUPERUSER_PASSWORD" | b64dec -}}
  {{- end }}
{{- end }}
{{- if .Values.django.secretKey }}
  {{- $secretKey = .Values.django.secretKey -}}
{{- end }}
{{- if not $secretKey }}
  {{- $secretKey = randAlphaNum 50 -}}
{{- end }}
{{- if .Values.django.superuserPassword }}
  {{- $superuserPassword = .Values.django.superuserPassword -}}
{{- end }}
{{- if not $superuserPassword }}
  {{- $superuserPassword = randAlphaNum 12 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "longclaw.fullname" . }}-env
  labels:
    {{- include "longclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ $secretKey | quote }}
  DJANGO_DEBUG: {{ .Values.django.debug | quote }}
  DJANGO_ALLOWED_HOSTS: {{ .Values.django.allowedHosts | quote }}
  DJANGO_SUPERUSER_USERNAME: {{ .Values.django.superuserUsername | quote }}
  DJANGO_SUPERUSER_PASSWORD: {{ $superuserPassword | quote }}
  DJANGO_SUPERUSER_EMAIL: {{ .Values.django.superuserEmail | quote }}
